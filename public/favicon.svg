<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 444 416" role="img" aria-labelledby="title desc">
  <title id="title">Eden-Core triangle favicon mark</title>
  <desc id="desc">Transparent Eden-Core triangular neon circuit logo mark without text or background.</desc>

  <defs>
    <linearGradient id="edenGradient" x1="222" y1="45" x2="222" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18EFE0"/>
      <stop offset="42%" stop-color="#26B9FF"/>
      <stop offset="100%" stop-color="#4525E6"/>
    </linearGradient>

    <linearGradient id="edenBottomGradient" x1="48" y1="325" x2="396" y2="325" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4525E6"/>
      <stop offset="48%" stop-color="#1DE8DF"/>
      <stop offset="100%" stop-color="#4525E6"/>
    </linearGradient>

    <linearGradient id="edenInnerGradient" x1="137" y1="305" x2="307" y2="137" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1DE8DF"/>
      <stop offset="52%" stop-color="#28BAFF"/>
      <stop offset="100%" stop-color="#4424E0"/>
    </linearGradient>

    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.10
                0 0 0 0 0.80
                0 0 0 0 1.00
                0 0 0 0.75 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <!-- Outer frame -->
    <path d="M222 53 L74 325 L370 325 Z"
          stroke="url(#edenGradient)" stroke-width="12"/>

    <!-- Purple base emphasis -->
    <path d="M74 325 L370 325"
          stroke="url(#edenBottomGradient)" stroke-width="13"/>

    <!-- Outer corner nodes -->
    <circle cx="222" cy="53" r="20" stroke="#18EFE0" stroke-width="10"/>
    <circle cx="74" cy="325" r="20" stroke="#4525E6" stroke-width="10"/>
    <circle cx="370" cy="325" r="20" stroke="#4525E6" stroke-width="10"/>

    <!-- Inner triangular circuit shape -->
    <path d="M137 305 L222 137 L307 305 L276 305"
          stroke="url(#edenInnerGradient)" stroke-width="10"/>

    <!-- Centre triangle -->
    <path d="M222 183 L170 282 L273 282 Z"
          stroke="url(#edenInnerGradient)" stroke-width="10"/>

    <!-- Lower circuit line -->
    <path d="M137 305 H240"
          stroke="#1DE8DF" stroke-width="10"/>

    <!-- Circuit nodes -->
    <circle cx="157" cy="221" r="9" stroke="#28BAFF" stroke-width="8"/>
    <circle cx="292" cy="248" r="9" stroke="#28BAFF" stroke-width="8"/>
    <circle cx="240" cy="305" r="9" stroke="#1DE8DF" stroke-width="8"/>
  </g>
</svg>
